[phases.setup]
nixPkgs = ["...", "nodejs_22", "npm"]

[phases.install]
cmds = [
    "cd backend && pip install -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "cd backend && python manage.py collectstatic --no-input"
]

[start]
cmd = "cd backend && python manage.py migrate --no-input && gunicorn fantasy_stocks.wsgi --bind 0.0.0.0:$PORT"
