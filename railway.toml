[build]
builder = "nixpacks"
nixpacksPlan = { providers = ["python", "node"] }
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd backend && python manage.py migrate --no-input && gunicorn fantasy_stocks.wsgi --bind 0.0.0.0:${PORT:-8000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
