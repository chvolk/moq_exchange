[build]
builder = "nixpacks"
nixpacksPlan = { providers = ["python", "node"] }
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && python manage.py collectstatic --noinput"

[deploy]
startCommand = "echo 'Starting deploy...' && echo \"PATH=$PATH\" && echo \"PORT=$PORT\" && export PATH=/opt/venv/bin:$PATH && cd backend && python manage.py migrate --noinput 2>&1 && echo 'Migrate done, starting gunicorn...' && gunicorn fantasy_stocks.wsgi --bind 0.0.0.0:${PORT:-8000} --timeout 120 --access-logfile - --error-logfile - 2>&1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
